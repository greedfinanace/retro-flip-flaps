<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>retro flip flaps</title>
    <meta
      name="description"
      content="Open-source retro split-flap board for the browser with mechanical flips, custom messages, and synchronized click audio."
    />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem('retro-flip-flaps-theme');
          const theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.dataset.theme = theme;
        } catch {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
